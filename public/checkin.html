<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check-in Diem Danh</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/vendor/fingerprintjs/fp.min.js"></script>
  </head>
  <body>
    <main class="container single">
      <section class="card">
        <h1>Check-in diem danh</h1>
        <p>
          Nhan vao nut duoi day de gui thong tin thiet bi (fingerprint + metadata) phuc vu diem danh.
        </p>
        <button id="checkinBtn">Diem danh ngay</button>
        <p id="statusText"></p>
      </section>

      <section class="card">
        <h2>JSON da gui</h2>
        <pre id="jsonOutput">{}</pre>
      </section>
    </main>

    <script>
      const checkinBtn = document.getElementById("checkinBtn");
      const statusText = document.getElementById("statusText");
      const jsonOutput = document.getElementById("jsonOutput");
      const token = window.location.pathname.split("/").pop();

      async function collectDeviceData() {
        if (typeof FingerprintJS === "undefined") {
          throw new Error("Khong tai duoc FingerprintJS. Hay thu refresh trang va kiem tra server.");
        }

        const fp = await FingerprintJS.load();
        const result = await fp.get();

        return {
          fingerprint: {
            visitorId: result.visitorId,
            confidence: result.confidence,
            version: result.version
          },
          browser: {
            userAgent: navigator.userAgent,
            language: navigator.language,
            languages: navigator.languages,
            platform: navigator.platform,
            cookieEnabled: navigator.cookieEnabled,
            doNotTrack: navigator.doNotTrack
          },
          device: {
            hardwareConcurrency: navigator.hardwareConcurrency || null,
            deviceMemory: navigator.deviceMemory || null,
            touchPoints: navigator.maxTouchPoints || 0
          },
          screen: {
            width: window.screen.width,
            height: window.screen.height,
            colorDepth: window.screen.colorDepth,
            pixelRatio: window.devicePixelRatio
          },
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          timestamp: new Date().toISOString()
        };
      }

      checkinBtn.addEventListener("click", async () => {
        checkinBtn.disabled = true;
        statusText.textContent = "Dang thu thap va gui du lieu...";

        try {
          const payload = await collectDeviceData();
          jsonOutput.textContent = JSON.stringify(payload, null, 2);

          const response = await fetch(`/api/checkin/${token}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Khong gui duoc du lieu diem danh");
          }

          statusText.textContent = "Diem danh thanh cong.";
        } catch (error) {
          statusText.textContent = `Loi: ${error.message}`;
          checkinBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
