<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check-in Diem Danh</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/vendor/fingerprintjs/fp.min.js"></script>
  </head>
  <body>
    <main class="container single">
      <section class="card">
        <h1>Check-in diem danh</h1>
        <p>
          Nhan vao nut duoi day de gui thong tin thiet bi (fingerprint + metadata) va GPS phuc vu diem danh.
        </p>
        <button id="checkinBtn">Diem danh ngay</button>
        <p id="statusText"></p>
      </section>

      <section class="card">
        <h2>JSON da gui</h2>
        <pre id="jsonOutput">{}</pre>
      </section>
    </main>

    <script>
      const checkinBtn = document.getElementById("checkinBtn");
      const statusText = document.getElementById("statusText");
      const jsonOutput = document.getElementById("jsonOutput");
      const token = window.location.pathname.split("/").pop();

      function getWebGLInfo() {
        try {
          const canvas = document.createElement("canvas");
          const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
          if (!gl) {
            return { supported: false, error: "WebGL not supported" };
          }

          const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
          const vendor = gl.getParameter(debugInfo ? gl.UNMASKED_VENDOR_WEBGL : gl.VENDOR);
          const renderer = gl.getParameter(debugInfo ? gl.UNMASKED_RENDERER_WEBGL : gl.RENDERER);
          const version = gl.getParameter(gl.VERSION);
          const shadingLanguageVersion = gl.getParameter(gl.SHADING_LANGUAGE_VERSION);

          return {
            supported: true,
            vendor: vendor,
            renderer: renderer,
            version: version,
            shadingLanguageVersion: shadingLanguageVersion,
            maxTextureSize: gl.getParameter(gl.MAX_TEXTURE_SIZE),
            maxViewportDims: gl.getParameter(gl.MAX_VIEWPORT_DIMS)
          };
        } catch (e) {
          return { supported: false, error: e.message };
        }
      }

      function getCanvasFingerprint() {
        try {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          if (!ctx) {
            return { error: "Canvas 2D not supported" };
          }

          canvas.width = 280;
          canvas.height = 60;

          const gradient = ctx.createLinearGradient(0, 0, 280, 60);
          gradient.addColorStop(0, "#ff0000");
          gradient.addColorStop(1, "#0000ff");
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, 280, 60);

          ctx.textBaseline = "top";
          ctx.font = '14px "Arial"';
          ctx.fillStyle = "#ffffff";
          ctx.fillText("Canvas fingerprint test 1234567890", 10, 10);

          ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
          ctx.beginPath();
          ctx.arc(100, 25, 20, 0, Math.PI * 2, true);
          ctx.fill();

          const dataUrl = canvas.toDataURL();
          return {
            supported: true,
            hash: dataUrl.substring(0, 50)
          };
        } catch (e) {
          return { supported: false, error: e.message };
        }
      }

      function getGpsLocation() {
        return new Promise((resolve) => {
          if (!("geolocation" in navigator)) {
            resolve({
              enabled: false,
              status: "unavailable",
              error: "Trinh duyet khong ho tro Geolocation API"
            });
            return;
          }

          navigator.geolocation.getCurrentPosition(
            (position) => {
              resolve({
                enabled: true,
                status: "granted",
                latitude: position.coords.latitude,
                longitude: position.coords.longitude,
                accuracy: position.coords.accuracy,
                altitude: position.coords.altitude,
                heading: position.coords.heading,
                speed: position.coords.speed,
                timestamp: new Date(position.timestamp).toISOString()
              });
            },
            (error) => {
              resolve({
                enabled: true,
                status: "denied-or-failed",
                error: error.message,
                code: error.code
              });
            },
            {
              enableHighAccuracy: true,
              timeout: 12000,
              maximumAge: 0
            }
          );
        });
      }

      async function collectDeviceData() {
        if (typeof FingerprintJS === "undefined") {
          throw new Error("Khong tai duoc FingerprintJS. Hay thu refresh trang va kiem tra server.");
        }

        const fp = await FingerprintJS.load();
        const result = await fp.get();
        const gps = await getGpsLocation();
        const webgl = getWebGLInfo();
        const canvas = getCanvasFingerprint();

        return {
          fingerprint: {
            visitorId: result.visitorId,
            confidence: result.confidence,
            version: result.version
          },
          browser: {
            userAgent: navigator.userAgent,
            language: navigator.language,
            languages: navigator.languages,
            platform: navigator.platform,
            cookieEnabled: navigator.cookieEnabled,
            doNotTrack: navigator.doNotTrack
          },
          device: {
            hardwareConcurrency: navigator.hardwareConcurrency || null,
            deviceMemory: navigator.deviceMemory || null,
            touchPoints: navigator.maxTouchPoints || 0
          },
          screen: {
            width: window.screen.width,
            height: window.screen.height,
            colorDepth: window.screen.colorDepth,
            pixelRatio: window.devicePixelRatio
          },
          graphics: {
            webgl: webgl,
            canvas: canvas
          },
          gps,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          timestamp: new Date().toISOString()
        };
      }

      checkinBtn.addEventListener("click", async () => {
        checkinBtn.disabled = true;
        statusText.textContent = "Dang thu thap va gui du lieu...";

        try {
          const payload = await collectDeviceData();
          jsonOutput.textContent = JSON.stringify(payload, null, 2);

          const response = await fetch(`/api/checkin/${token}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Khong gui duoc du lieu diem danh");
          }

          if (payload.gps && payload.gps.status === "granted") {
            statusText.textContent = "Diem danh thanh cong. Da thu thap GPS.";
          } else {
            statusText.textContent = "Diem danh thanh cong. GPS bi tu choi hoac khong kha dung.";
          }
        } catch (error) {
          statusText.textContent = `Loi: ${error.message}`;
          checkinBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
